[[mgr.prepend_keymap]]
on = [ "c", "a" ]
run = "plugin ouch"
desc = "Create archive (ouch)"

[[mgr.append_keymap]]
# Copy
on = [ "c", "k" ]
run = "shell 'cat $0 | wl-copy' --confirm"
desc = "Copy the file content"

[[mgr.prepend_keymap]]
on  = "<C-n>"
run  = 'shell "ripdrag $@" --orphan'
desc = "Drag hovered/selected files with ripdrag"

[[mgr.prepend_keymap]]
on   = "<C-p>"
run  = "plugin toggle-pane min-preview"
desc = "Toggle preview pane"
